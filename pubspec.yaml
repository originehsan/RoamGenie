name: rome_gini
description: "RoamGenie — AI-powered travel planning app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  dio: ^5.7.0
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # ── Fancy UI packages ────────────────────────────────────────────────────────
  lottie: ^3.3.1                  # Lottie animations (loading, success, error)
  fl_chart: ^0.70.2               # Beautiful data charts (passport regions pie)
  animated_text_kit: ^4.2.2       # Typewriter & shine text animations
  url_launcher: ^6.3.1            # Open booking links, emails, phone
  glassmorphism: ^3.0.0           # Glassmorphism card effects

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

